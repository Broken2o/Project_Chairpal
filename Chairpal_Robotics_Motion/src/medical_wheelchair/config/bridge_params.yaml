# Bridge configuration for medical_wheelchair
- ros_topic: "/clock"
  gz_topic: "/clock"
  ros_type: "rosgraph_msgs/msg/Clock"
  gz_type: "gz.msgs.Clock"
  direction: GZ_TO_ROS

- ros_topic: "/scan"
  gz_topic: "/scan"
  ros_type: "sensor_msgs/msg/LaserScan"
  gz_type: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

- ros_topic: "/joint_states"
  gz_topic: "/joint_states"
  ros_type: "sensor_msgs/msg/JointState"
  gz_type: "gz.msgs.Model"
  direction: GZ_TO_ROS

- ros_topic: "/cmd_vel"
  gz_topic: "/cmd_vel"
  ros_type: "geometry_msgs/msg/Twist"
  gz_type: "gz.msgs.Twist"
  direction: BIDIRECTIONAL

# Camera topics
- ros_topic: "/camera/image"
  gz_topic: "/world/empty/model/wheelchair/link/base_footprint/sensor/camera/image"
  ros_type: "sensor_msgs/msg/Image"
  gz_type: "gz.msgs.Image"
  direction: GZ_TO_ROS

- ros_topic: "/camera/depth_image"
  gz_topic: "/world/empty/model/wheelchair/link/base_footprint/sensor/camera/depth_image"
  ros_type: "sensor_msgs/msg/Image"
  gz_type: "gz.msgs.Image"
  direction: GZ_TO_ROS

